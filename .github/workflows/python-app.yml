name: Build Lucis-Sub Executable
run-name: No${{ github.run_number }} |🚀 Build Lucis-Sub by @${{ github.actor }} | ${{ github.event.repository.updated_at }}

# 只要 main 分支有代码推上来，立刻自动打包
on:
  push:
    branches: [ "main" ]

# 显式声明允许此流水线向你的 Release 写入二进制资产文件
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyqt6 beautifulsoup4

      - name: Build with PyInstaller (Onedir Mode)
        run: |
          pyinstaller --onedir --noconsole --name "Lucis_Chat" --icon "assets/icon.ico" --add-data "assets;assets" main.py
          
      # 修正点 1：将压缩路径完全对齐为真正的生成目录 dist/Lucis_Sub_Substack
      - name: Compress artifacts to Custom ZIP
        shell: powershell
        run: |
          Compress-Archive -Path dist/Lucis_Sub_Substack -DestinationPath Lucis_Sub_Substack_Windows_V20260618_beta.zip

      # 修正点 2：将上传组件的物理路径也对齐
      - name: Upload artifact to Actions Tab
        uses: actions/upload-artifact@v4
        with:
          name: 101_Lucis_Sub_Substack
          path: dist/Lucis_Sub_Substack/

      # 自动覆盖/更新一个名为 "latest" 的 Release
      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: Lucis_Sub_Substack_Windows_V20260618_beta.zip
          name: Lucis_Sub_Substack_Windows_V20260618_beta
          tag_name: latest  # 固定推送到一个名为 latest 的发布位置
          draft: false
          prerelease: false
