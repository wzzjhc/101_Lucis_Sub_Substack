name: Build Lucis-Sub Executable
run-name: No${{ github.run_number }} |🚀 Build Lucis-Sub by @${{ github.actor }}

on:
  push:
    tags:
      - 'v*'  # 当你推送以 v 开头的标签（如 v1.0, v20260618）时，自动触发打包

# 核心修正：必须显式声明允许此流水线向你的 Release 写入二进制资产文件
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyqt6 beautifulsoup4

      - name: Build with PyInstaller (Onedir Mode)
        run: |
          pyinstaller --onedir --noconsole --name "Lucis-Sub" --icon "favicon.ico" --add-data "favicon.ico;." --add-data "logo.png;." --add-data "like.png;." main.py

      # 关键步骤：在上传前，必须先在工作空间内把生成的绿色文件夹压缩为独立的 zip 文件
      - name: Compress artifacts to Custom ZIP
        shell: powershell
        run: |
          Compress-Archive -Path dist/Lucis-Sub/* -DestinationPath Lucis_Sub_Substack_Windows_V20260618_beta.zip

      - name: Upload artifact to Actions Tab
        uses: actions/upload-artifact@v4
        with:
          name: Lucis-Sub-Raw-Directory
          path: dist/Lucis-Sub/

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # 让 Release 下载项中直接出现你指定好名字的专属纯绿色 ZIP 包
          files: Lucis_Sub_Substack_Windows_V20260618_beta.zip
          # 设置 Release 的大标题
          name: Lucis_Sub_Substack_Windows_V20260618_beta
          draft: false
          prerelease: false
