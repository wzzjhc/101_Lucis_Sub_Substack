name: Build Lucis-Sub Executable
run-name: No${{ github.run_number }} |🚀 Build Lucis-Sub by @${{ github.actor }} | ${{ github.event.repository.updated_at }}

# 彻底改写：只要 main 分支有代码推上来，立刻引爆自动打包
on:
  push:
    branches: [ "main" ]

# 必须显式声明允许此流水线向你的 Release 写入二进制资产文件
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyqt6 beautifulsoup4

      - name: Build with PyInstaller (Onedir Mode)
        run: |
          pyinstaller --onedir --noconsole --name "Lucis-Sub" --icon "favicon.ico" --add-data "favicon.ico;." --add-data "logo.png;." --add-data "like.png;." main.py

      # 在工作空间内把生成的绿色文件夹压缩为独立的 zip 文件
      - name: Compress artifacts to Custom ZIP
        shell: powershell
        run: |
          Compress-Archive -Path dist/Lucis-Sub/* -DestinationPath Lucis_Sub_Substack_Windows_V20260618_beta.zip

      - name: Upload artifact to Actions Tab
        uses: actions/upload-artifact@v4
        with:
          name: Lucis-Sub-Raw-Directory
          path: dist/Lucis-Sub/

      # 彻底改写：去掉条件限制，每次 push 自动覆盖/更新一个名为 "latest" 的 Release
      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: Lucis_Sub_Substack_Windows_V20260618_beta.zip
          name: Lucis_Sub_Substack_Windows_V20260618_beta
          tag_name: latest  # 固定推送到一个名为 latest 的发布位置
          draft: false
          prerelease: false
